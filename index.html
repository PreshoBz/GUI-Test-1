<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cine-Search Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!--------------------- Core Search Component Interface --------------------->
<div class="search-component">
    <input type="text" class="search-input" placeholder="Search movies...">
    <div class="search-results" data-loading="false"></div>
  </div>

  <!-- Detail Panel -->
  <div id="detailPanel" class="hidden">
    <div id="detailTitle"></div>
    <p id="detailOverview"></p>
    <h3>Cast</h3>
    <ul id="detailCast"></ul>
    <h3>Videos</h3>
    <div id="detailVideos"></div>
  </div>

  <script src="search.js"></script>
</body>
</html>
